<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>第一場研習證書下載</title>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 48px;
      font-family:
        "Microsoft JhengHei",
        "PingFang TC",
        Arial,
        sans-serif;
      background: #f3f4f6;
      color: #222;
      text-align: center;
    }

    .form-box {
      max-width: 700px;
      margin: 0 auto 24px;
      padding: 26px 20px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 3px 16px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    .description {
      margin: 0 0 18px;
      color: #555;
      line-height: 1.7;
    }

    .attendance-notice {
      max-width: 600px;
      margin: 0 auto 22px;
      padding: 15px 18px;
      color: #57460a;
      background: #fff8dc;
      border: 1px solid #e5ce78;
      border-left: 5px solid #c99a14;
      border-radius: 8px;
      text-align: left;
      font-size: 15px;
      line-height: 1.75;
    }

    .attendance-notice strong {
      color: #493800;
      font-size: 16px;
    }

    #nameInput {
      width: 90%;
      max-width: 380px;
      padding: 13px 15px;
      font-size: 22px;
      text-align: center;
      border: 1px solid #aaa;
      border-radius: 8px;
      outline: none;
    }

    #nameInput:focus {
      border-color: #2457a7;
      box-shadow: 0 0 0 3px rgba(36, 87, 167, 0.12);
    }

    .confirm-row {
      margin-top: 17px;
      font-size: 16px;
      line-height: 1.6;
    }

    .confirm-row input {
      width: 18px;
      height: 18px;
      vertical-align: middle;
    }

    button {
      margin-top: 18px;
      padding: 13px 28px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: #2457a7;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .notice {
      margin: 15px 0 0;
      color: #777;
      font-size: 14px;
      line-height: 1.6;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 15px;
      color: #b42318;
    }

    .preview-title {
      margin: 28px 0 12px;
      font-size: 20px;
    }

    .preview-wrapper {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 3px 18px rgba(0, 0, 0, 0.16);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    @media (max-width: 600px) {
      body {
        padding: 14px 10px 30px;
      }

      .form-box {
        padding: 22px 14px;
      }

      h1 {
        font-size: 25px;
      }

      .attendance-notice {
        padding: 13px 14px;
        font-size: 14px;
      }

      #nameInput {
        font-size: 20px;
      }

      button {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <main>
    <section class="form-box">

      <h1>第一場研習證書下載</h1>

      <p class="description">
        請輸入要顯示在證書上的姓名，
        確認預覽無誤後下載。
      </p>

      <div class="attendance-notice">
        <strong>提醒您：</strong>
        本頁僅提供實際參加第一場研習，
        並完成現場簽到的參加者下載證書。<br>
        主辦單位會依第一場現場簽到紀錄確認資格；
        若未出席或未完成簽到，下載的證書將不具效力。
      </div>

      <input
        id="nameInput"
        type="text"
        maxlength="20"
        autocomplete="name"
        placeholder="例如：陳家麒 先生"
      >

      <div class="confirm-row">
        <label>
          <input
            id="confirmCheckbox"
            type="checkbox"
          >
          我已確認姓名正確，且本人已參加第一場研習並完成簽到
        </label>
      </div>

      <button
        id="downloadButton"
        type="button"
      >
        下載第一場 A4 PDF 證書
      </button>

      <p class="notice">
        系統不會保存你輸入的姓名。<br>
        請確認證書預覽無誤後再下載。
      </p>

      <div
        id="statusMessage"
        class="status"
      ></div>

    </section>

    <h2 class="preview-title">證書預覽</h2>

    <section class="preview-wrapper">
      <canvas id="certificateCanvas"></canvas>
    </section>
  </main>

  <script>
    const canvas =
      document.getElementById("certificateCanvas");

    const context =
      canvas.getContext("2d");

    const nameInput =
      document.getElementById("nameInput");

    const confirmCheckbox =
      document.getElementById("confirmCheckbox");

    const downloadButton =
      document.getElementById("downloadButton");

    const statusMessage =
      document.getElementById("statusMessage");

    const backgroundImage = new Image();

    backgroundImage.src =
      "certificate-session-1.png";

    canvas.width = 2480;
    canvas.height = 3508;

    let backgroundLoaded = false;

    backgroundImage.onload = function () {
      backgroundLoaded = true;
      statusMessage.textContent = "";
      drawCertificate();
    };

    backgroundImage.onerror = function () {
      backgroundLoaded = false;
      statusMessage.style.color = "#b42318";
      statusMessage.textContent =
        "找不到第一場證書底圖，請確認圖片檔名與上傳位置。";
      drawErrorCanvas();
    };

    function drawErrorCanvas() {
      context.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.fillStyle = "#fff";

      context.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.fillStyle = "#b42318";
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.font =
        'bold 60px "Microsoft JhengHei", sans-serif';

      context.fillText(
        "尚未讀取到第一場證書底圖",
        canvas.width / 2,
        canvas.height / 2
      );
    }

    function getDisplayName() {
      const enteredName = nameInput.value
        .replace(/\s+/g, " ")
        .trim();

      return enteredName || "姓名預覽";
    }

    function getNameFontSize(name) {
      const actualLength =
        name.replace(/\s/g, "").length;

      if (actualLength >= 12) {
        return 72;
      }

      if (actualLength >= 9) {
        return 82;
      }

      if (actualLength >= 7) {
        return 92;
      }

      return 105;
    }

    function drawCertificate() {
      if (!backgroundLoaded) {
        return;
      }

      const name = getDisplayName();
      const fontSize = getNameFontSize(name);

      context.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.drawImage(
        backgroundImage,
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.save();

      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillStyle = "#0b1f33";

      context.font =
        `bold ${fontSize}px ` +
        `"Microsoft JhengHei", ` +
        `"PingFang TC", sans-serif`;

      context.fillText(
        name,
        canvas.width / 2,
        1351
      );

      context.restore();
    }

    function validateName() {
      const name = nameInput.value.trim();

      if (!name) {
        statusMessage.style.color = "#b42318";
        statusMessage.textContent = "請先輸入姓名。";
        nameInput.focus();
        return false;
      }

      if (!confirmCheckbox.checked) {
        statusMessage.style.color = "#b42318";
        statusMessage.textContent =
          "請確認姓名正確，且本人已參加第一場研習並完成簽到。";
        return false;
      }

      if (!backgroundLoaded) {
        statusMessage.style.color = "#b42318";
        statusMessage.textContent =
          "第一場證書底圖尚未載入，暫時無法下載。";
        return false;
      }

      statusMessage.textContent = "";
      return true;
    }

    nameInput.addEventListener(
      "input",
      function () {
        confirmCheckbox.checked = false;
        statusMessage.textContent = "";
        drawCertificate();
      }
    );

    confirmCheckbox.addEventListener(
      "change",
      function () {
        statusMessage.textContent = "";
      }
    );

    downloadButton.addEventListener(
      "click",
      function () {
        if (!validateName()) {
          return;
        }

        drawCertificate();

        const name =
          nameInput.value.trim();

        downloadButton.disabled = true;
        downloadButton.textContent =
          "正在產生 PDF…";

        try {
          const imageData =
            canvas.toDataURL("image/jpeg", 0.98);

          const { jsPDF } =
            window.jspdf;

          const pdf = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4",
            compress: true
          });

          pdf.addImage(
            imageData,
            "JPEG",
            0,
            0,
            210,
            297
          );

          const safeFileName =
            name.replace(
              /[\\/:*?"<>|]/g,
              "_"
            );

          pdf.save(
            `${safeFileName}_第一場研習證書.pdf`
          );

          statusMessage.style.color =
            "#18794e";

          statusMessage.textContent =
            "第一場研習證書已產生，請查看下載項目。";

        } catch (error) {
          console.error(error);

          statusMessage.style.color =
            "#b42318";

          statusMessage.textContent =
            "PDF 產生失敗，請重新整理後再試一次。";

        } finally {
          downloadButton.disabled = false;
          downloadButton.textContent =
            "下載第一場 A4 PDF 證書";
        }
      }
    );
  </script>

</body>
</html>
