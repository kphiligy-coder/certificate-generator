<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>證書產生器</title>

  <!-- PDF 產生工具 -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 48px;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f3f4f6;
      color: #222;
      text-align: center;
    }

    .form-box {
      max-width: 700px;
      margin: 0 auto 24px;
      padding: 26px 20px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 3px 16px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    .description {
      margin-bottom: 20px;
      color: #555;
      line-height: 1.7;
    }

    #nameInput {
      width: 90%;
      max-width: 380px;
      padding: 13px 15px;
      font-size: 22px;
      text-align: center;
      border: 1px solid #aaa;
      border-radius: 8px;
      outline: none;
    }

    #nameInput:focus {
      border-color: #2457a7;
      box-shadow: 0 0 0 3px rgba(36, 87, 167, 0.12);
    }

    .confirm-row {
      margin-top: 17px;
      font-size: 16px;
    }

    .confirm-row input {
      width: 18px;
      height: 18px;
      vertical-align: middle;
    }

    button {
      margin-top: 18px;
      padding: 13px 28px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: #2457a7;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .notice {
      margin: 15px 0 0;
      color: #777;
      font-size: 14px;
      line-height: 1.6;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 15px;
      color: #b42318;
    }

    .preview-title {
      margin: 28px 0 12px;
      font-size: 20px;
    }

    .preview-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      overflow: hidden;
      background: white;
      box-shadow: 0 3px 18px rgba(0, 0, 0, 0.16);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: white;
    }

    @media (max-width: 600px) {
      body {
        padding: 14px 10px 30px;
      }

      .form-box {
        padding: 22px 14px;
      }

      h1 {
        font-size: 25px;
      }

      #nameInput {
        font-size: 20px;
      }

      button {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <main>
    <section class="form-box">
      <h1>證書產生器</h1>

      <p class="description">
        請輸入要顯示在證書上的姓名，確認預覽無誤後下載。
      </p>

      <input
        id="nameInput"
        type="text"
        maxlength="20"
        autocomplete="name"
        placeholder="例如：王小明"
      >

      <div class="confirm-row">
        <label>
          <input id="confirmCheckbox" type="checkbox">
          我已確認姓名輸入正確
        </label>
      </div>

      <button id="downloadButton" type="button">
        下載 A4 PDF 證書
      </button>

      <p class="notice">
        系統不會保存你輸入的姓名。<br>
        請先確認證書預覽，再進行下載。
      </p>

      <div id="statusMessage" class="status"></div>
    </section>

    <h2 class="preview-title">證書預覽</h2>

    <section class="preview-wrapper">
      <canvas id="certificateCanvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("certificateCanvas");
    const context = canvas.getContext("2d");

    const nameInput = document.getElementById("nameInput");
    const confirmCheckbox =
      document.getElementById("confirmCheckbox");

    const downloadButton =
      document.getElementById("downloadButton");

    const statusMessage =
      document.getElementById("statusMessage");

    const backgroundImage = new Image();

    /*
      請確認 GitHub 裡的底圖名稱是 certificate-bg.png。
      如果不是，請把下面的檔名改成你的實際檔名。
    */
    backgroundImage.src = "certificate-bg.png";

    /*
      A4 橫式，約 300 DPI：
      3508 × 2480 px
    */
    canvas.width = 3508;
    canvas.height = 2480;

    let backgroundLoaded = false;

    backgroundImage.onload = function () {
      backgroundLoaded = true;
      statusMessage.textContent = "";
      drawCertificate();
    };

    backgroundImage.onerror = function () {
      backgroundLoaded = false;

      statusMessage.textContent =
        "找不到證書底圖，請確認圖片檔名及上傳位置。";

      drawErrorCanvas();
    };

    function drawErrorCanvas() {
      context.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.fillStyle = "#ffffff";
      context.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.fillStyle = "#b42318";
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.font =
        'bold 90px "Microsoft JhengHei", sans-serif';

      context.fillText(
        "尚未讀取到證書底圖",
        canvas.width / 2,
        canvas.height / 2
      );
    }

    function getDisplayName() {
      const enteredName = nameInput.value
        .replace(/\s+/g, " ")
        .trim();

      return enteredName || "姓名預覽";
    }

    function getNameFontSize(name) {
      /*
        依姓名長度自動縮小。
        也可依實際底圖再調整。
      */
      if (name.length >= 13) {
        return 100;
      }

      if (name.length >= 10) {
        return 120;
      }

      if (name.length >= 8) {
        return 140;
      }

      if (name.length >= 6) {
        return 160;
      }

      return 185;
    }

    function drawCertificate() {
      if (!backgroundLoaded) {
        return;
      }

      const name = getDisplayName();
      const fontSize = getNameFontSize(name);

      context.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.drawImage(
        backgroundImage,
        0,
        0,
        canvas.width,
        canvas.height
      );

      context.save();

      context.textAlign = "center";
      context.textBaseline = "middle";

      /*
        姓名文字顏色。
        可改成其他色碼，例如：
        #000000 黑色
        #17365D 深藍色
        #7A1F1F 暗紅色
      */
      context.fillStyle = "#222222";

      context.font =
        `bold ${fontSize}px "Microsoft JhengHei", ` +
        `"PingFang TC", sans-serif`;

      /*
        姓名位置：
        canvas.width / 2 = 水平正中央
        1120 = 上下位置

        姓名太高：把 1120 加大，例如 1200
        姓名太低：把 1120 改小，例如 1030
      */
      context.fillText(
        name,
        canvas.width / 2,
        1120
      );

      context.restore();
    }

    function validateName() {
      const name = nameInput.value.trim();

      if (!name) {
        statusMessage.textContent = "請先輸入姓名。";
        nameInput.focus();
        return false;
      }

      if (name.length > 20) {
        statusMessage.textContent =
          "姓名字數過長，請重新確認。";

        nameInput.focus();
        return false;
      }

      if (!confirmCheckbox.checked) {
        statusMessage.textContent =
          "請勾選「我已確認姓名輸入正確」。";

        return false;
      }

      if (!backgroundLoaded) {
        statusMessage.textContent =
          "證書底圖尚未載入，暫時無法下載。";

        return false;
      }

      statusMessage.textContent = "";
      return true;
    }

    nameInput.addEventListener("input", function () {
      confirmCheckbox.checked = false;
      statusMessage.textContent = "";
      drawCertificate();
    });

    confirmCheckbox.addEventListener("change", function () {
      statusMessage.textContent = "";
    });

    downloadButton.addEventListener("click", function () {
      if (!validateName()) {
        return;
      }

      drawCertificate();

      const name = nameInput.value.trim();

      downloadButton.disabled = true;
      downloadButton.textContent = "正在產生 PDF…";

      try {
        const imageData =
          canvas.toDataURL("image/jpeg", 0.98);

        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({
          orientation: "landscape",
          unit: "mm",
          format: "a4",
          compress: true
        });

        pdf.addImage(
          imageData,
          "JPEG",
          0,
          0,
          297,
          210
        );

        const safeFileName = name.replace(
          /[\\/:*?"<>|]/g,
          "_"
        );

        pdf.save(
          `${safeFileName}_證書.pdf`
        );

        statusMessage.style.color = "#18794e";
        statusMessage.textContent =
          "證書已產生，請查看瀏覽器的下載項目。";
      } catch (error) {
        console.error(error);

        statusMessage.style.color = "#b42318";
        statusMessage.textContent =
          "PDF 產生失敗，請重新整理後再試一次。";
      } finally {
        downloadButton.disabled = false;
        downloadButton.textContent =
          "下載 A4 PDF 證書";
      }
    });
  </script>

</body>
</html>
