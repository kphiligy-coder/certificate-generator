                                                             <!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>證書產生器</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f3f4f6;
      text-align: center;
    }

    .form-box {
      max-width: 680px;
      margin: 0 auto 24px;
      padding: 24px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    input {
      width: 80%;
      max-width: 320px;
      padding: 12px;
      font-size: 20px;
      text-align: center;
      border: 1px solid #999;
      border-radius: 6px;
    }

    button {
      margin-top: 16px;
      padding: 12px 24px;
      font-size: 17px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #1d4ed8;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .notice {
      margin-top: 14px;
      color: #666;
      font-size: 14px;
    }

    .preview-box {
      max-width: 1000px;
      margin: auto;
    }

    canvas {
      width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>

<body>

  <div class="form-box">
    <h1>結業證書產生器</h1>

    <p>請輸入要顯示在證書上的姓名</p>

    <input
      id="nameInput"
      type="text"
      maxlength="20"
      placeholder="例如：王小明"
    >

    <br>

    <button id="downloadButton">下載 A4 PDF 證書</button>

    <p class="notice">
      請確認姓名正確後再下載。
    </p>
  </div>

  <div class="preview-box">
    <canvas id="certificateCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("certificateCanvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("nameInput");
    const downloadButton = document.getElementById("downloadButton");

    const backgroundImage = new Image();

    // Canva 證書底圖檔名
    backgroundImage.src = "0609certificate-bg.png";

    // A4 橫式，約 300 DPI
    canvas.width = 3508;
    canvas.height = 2480;

    backgroundImage.onload = function () {
      drawCertificate();
    };

    backgroundImage.onerror = function () {
      alert("找不到 0609certificate-bg.png，請確認圖片和 index.html 放在同一個資料夾。");
    };

    function drawCertificate() {
      const name = nameInput.value.trim() || "姓名預覽";

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(
        backgroundImage,
        0,
        0,
        canvas.width,
        canvas.height
      );

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#222222";

      let fontSize = 180;

      if (name.length >= 9) {
        fontSize = 115;
      } else if (name.length >= 7) {
        fontSize = 135;
      } else if (name.length >= 5) {
        fontSize = 155;
      }

      ctx.font =
        `bold ${fontSize}px "Microsoft JhengHei", sans-serif`;

      // 姓名位置：最後的 1120 是上下位置
      ctx.fillText(
        name,
        canvas.width / 2,
        1120
      );
    }

    nameInput.addEventListener("input", drawCertificate);

    downloadButton.addEventListener("click", function () {
      const name = nameInput.value.trim();

      if (!name) {
        alert("請先輸入姓名。");
        nameInput.focus();
        return;
      }

      drawCertificate();

      const imageData =
        canvas.toDataURL("image/jpeg", 0.98);

      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF({
        orientation: "landscape",
        unit: "mm",
        format: "a4"
      });

      pdf.addImage(
        imageData,
        "JPEG",
        0,
        0,
        297,
        210
      );

      const safeName = name.replace(/[\\/:*?"<>|]/g, "_");

      pdf.save(`${safeName}_結業證書.pdf`);
    });
  </script>

</body>
</html>
